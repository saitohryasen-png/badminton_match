
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.app { padding: 1.5rem 0; max-width: 640px; }
h1 { font-size: 20px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
.subtitle { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 1.5rem; }
.section-label { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
.player-input-row { display: flex; gap: 8px; margin-bottom: 8px; }
.player-input-row input { flex: 1; }
.player-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 1.5rem; }
.player-chip { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); font-size: 14px; color: var(--color-text-primary); }
.player-chip .name { display: flex; align-items: center; gap: 10px; }
.player-chip .num { width: 22px; height: 22px; border-radius: 50%; background: var(--color-background-secondary); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; color: var(--color-text-secondary); }
.stat-pills { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
.stat-pill { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
.pill-play { background: #E6F1FB; color: #0C447C; }
.pill-rest { background: var(--color-background-secondary); color: var(--color-text-secondary); }
.remove-btn { background: none; border: none; cursor: pointer; color: var(--color-text-tertiary); padding: 2px; display: flex; align-items: center; border-radius: 4px; transition: color 0.15s, background 0.15s; margin-left: 6px; }
.remove-btn:hover { color: var(--color-text-danger); background: var(--color-background-danger); }
.empty-state { padding: 2rem 1rem; text-align: center; border: 0.5px dashed var(--color-border-secondary); border-radius: var(--border-radius-md); color: var(--color-text-tertiary); font-size: 13px; margin-bottom: 1.5rem; }
.btn-primary { width: 100%; padding: 12px; background: var(--color-text-primary); color: var(--color-background-primary); border: none; border-radius: var(--border-radius-md); font-size: 15px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: opacity 0.15s, transform 0.1s; margin-bottom: 1rem; }
.btn-primary:hover:not(:disabled) { opacity: 0.85; }
.btn-primary:active:not(:disabled) { transform: scale(0.98); }
.btn-primary:disabled { opacity: 0.35; cursor: default; }
.btn-ghost { width: 100%; padding: 9px; background: none; color: var(--color-text-tertiary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: background 0.15s; margin-bottom: 1.5rem; }
.btn-ghost:hover { background: var(--color-background-secondary); }
.warn-box { padding: 10px 14px; background: var(--color-background-warning); border: 0.5px solid var(--color-border-warning); border-radius: var(--border-radius-md); font-size: 13px; color: var(--color-text-warning); margin-bottom: 1rem; display: flex; align-items: flex-start; gap: 8px; }
.result-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; margin-bottom: 1rem; animation: fadeUp 0.3s ease; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.result-header { padding: 10px 16px; background: var(--color-background-secondary); font-size: 12px; font-weight: 500; color: var(--color-text-secondary); border-bottom: 0.5px solid var(--color-border-tertiary); display: flex; align-items: center; justify-content: space-between; }
.match-body { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 1.25rem 1rem; gap: 12px; }
.team { display: flex; flex-direction: column; gap: 8px; }
.team.right { align-items: flex-end; }
.player-tag { padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 500; }
.team-a .player-tag { background: #E6F1FB; color: #0C447C; }
.team-b .player-tag { background: #FBEAF0; color: #72243E; }
.vs-badge { font-size: 18px; font-weight: 500; color: var(--color-text-secondary); }
.bench-section { padding: 10px 16px; border-top: 0.5px solid var(--color-border-tertiary); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.bench-label { font-size: 11px; color: var(--color-text-tertiary); white-space: nowrap; }
.bench-chip { padding: 4px 10px; background: var(--color-background-secondary); border-radius: 12px; font-size: 12px; color: var(--color-text-secondary); }
.new-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #EAF3DE; color: #3B6D11; font-weight: 500; }
</style>

<div class="app">
  <h1><i class="ti ti-trophy" aria-hidden="true" style="font-size:20px; color: var(--color-text-secondary);"></i> バドミントン対戦メーカー</h1>
  <p class="subtitle">出場均等 ＋ 同じペアにならないよう自動で調整します。</p>

  <div class="section-label">選手登録 <span id="player-count" style="font-weight:400;">(0 / 6)</span></div>
  <div class="player-input-row">
    <input type="text" id="name-input" placeholder="選手名を入力…" maxlength="12" />
    <button onclick="addPlayer()" style="white-space:nowrap; padding: 0 16px;">
      <i class="ti ti-plus" aria-hidden="true"></i> 追加
    </button>
  </div>
  <div id="player-list" class="player-list">
    <div class="empty-state">選手を追加してください</div>
  </div>

  <button class="btn-primary" id="match-btn" onclick="generateMatch()" disabled>
    <i class="ti ti-refresh" aria-hidden="true"></i> 対戦を抽選する
  </button>
  <button class="btn-ghost" onclick="resetAll()">
    <i class="ti ti-rotate" aria-hidden="true"></i> 出場記録・ペア履歴をリセット
  </button>

  <div id="warn-area"></div>
  <div id="result-area"></div>
</div>

<script>
let players = [];
let stats = {}; // name -> { playCount, restCount }
let pairHistory = {}; // "A|B" -> count
let matchHistory = [];

const nameInput = document.getElementById('name-input');
const playerListEl = document.getElementById('player-list');
const playerCount = document.getElementById('player-count');
const matchBtn = document.getElementById('match-btn');
const resultArea = document.getElementById('result-area');
const warnArea = document.getElementById('warn-area');

nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') addPlayer(); });

function pairKey(a, b) { return [a, b].sort().join('|'); }

function getPairCount(a, b) { return pairHistory[pairKey(a, b)] || 0; }

function addPlayer() {
  const name = nameInput.value.trim();
  if (!name || players.length >= 6) return;
  if (players.includes(name)) {
    nameInput.style.borderColor = 'var(--color-border-danger)';
    setTimeout(() => nameInput.style.borderColor = '', 1000);
    return;
  }
  players.push(name);
  stats[name] = { playCount: 0, restCount: 0 };
  nameInput.value = '';
  nameInput.focus();
  render();
}

function removePlayer(i) {
  const name = players[i];
  players.splice(i, 1);
  delete stats[name];
  render();
}

function resetAll() {
  players.forEach(p => { stats[p] = { playCount: 0, restCount: 0 }; });
  pairHistory = {};
  matchHistory = [];
  warnArea.innerHTML = '';
  resultArea.innerHTML = '';
  matchBtn.innerHTML = '<i class="ti ti-refresh" aria-hidden="true"></i> 対戦を抽選する';
  render();
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// 4人からペアを作る全組み合わせ: (0,1)vs(2,3) / (0,2)vs(1,3) / (0,3)vs(1,2)
function allPairings(four) {
  return [
    { teamA: [four[0], four[1]], teamB: [four[2], four[3]] },
    { teamA: [four[0], four[2]], teamB: [four[1], four[3]] },
    { teamA: [four[0], four[3]], teamB: [four[1], four[2]] },
  ];
}

function pairingScore(pairing) {
  // ペア過去回数の合計が少ないほど良い
  const { teamA, teamB } = pairing;
  return getPairCount(teamA[0], teamA[1]) + getPairCount(teamB[0], teamB[1]);
}

function generateMatch() {
  const n = players.length;

  // 出場回数が少ない順 → 同数はシャッフルで公平に
  const shuffled = shuffle(players);
  shuffled.sort((a, b) => stats[a].playCount - stats[b].playCount);

  const playing = shuffled.slice(0, 4);
  const bench = shuffled.slice(4);

  // 3通りのペアリングからスコア最小を選ぶ（同スコアはランダム）
  const pairings = shuffle(allPairings(playing)); // シャッフルで同点時の偏りをなくす
  pairings.sort((a, b) => pairingScore(a) - pairingScore(b));
  const best = pairings[0];
  const { teamA, teamB } = best;

  const isNewPairA = getPairCount(teamA[0], teamA[1]) === 0;
  const isNewPairB = getPairCount(teamB[0], teamB[1]) === 0;

  // 全ペアが既出の場合は警告
  const allUsed = pairings.every(p => pairingScore(p) > 0);

  // 統計更新
  playing.forEach(p => { stats[p].playCount++; stats[p].restCount = 0; });
  bench.forEach(p => { stats[p].restCount++; });
  pairHistory[pairKey(teamA[0], teamA[1])] = (pairHistory[pairKey(teamA[0], teamA[1])] || 0) + 1;
  pairHistory[pairKey(teamB[0], teamB[1])] = (pairHistory[pairKey(teamB[0], teamB[1])] || 0) + 1;

  matchHistory.unshift({ teamA, teamB, bench, isNewPairA, isNewPairB, allUsed });
  if (matchHistory.length > 5) matchHistory.pop();

  warnArea.innerHTML = allUsed
    ? `<div class="warn-box"><i class="ti ti-alert-triangle" style="font-size:16px; flex-shrink:0; margin-top:1px;" aria-hidden="true"></i><span>全ての組み合わせが一度使われました。最もペアの重複が少ない組み合わせを選びました。</span></div>`
    : '';

  render();
  renderResults();
  matchBtn.innerHTML = '<i class="ti ti-refresh" aria-hidden="true"></i> もう一度抽選する';
}

function render() {
  playerCount.textContent = `(${players.length} / 6)`;
  matchBtn.disabled = players.length < 4;

  if (players.length === 0) {
    playerListEl.innerHTML = '<div class="empty-state">選手を追加してください</div>';
    return;
  }

  playerListEl.innerHTML = players.map((p, i) => {
    const s = stats[p];
    const total = s.playCount + s.restCount;
    return `
    <div class="player-chip">
      <div class="name">
        <div class="num">${i + 1}</div>
        <span>${p}</span>
      </div>
      <div style="display:flex; align-items:center;">
        <div class="stat-pills">
          ${total > 0 ? `<span class="stat-pill pill-play">出場 ${s.playCount}</span>` : ''}
          ${s.restCount > 0 ? `<span class="stat-pill pill-rest">連続休み ${s.restCount}</span>` : ''}
        </div>
        <button class="remove-btn" onclick="removePlayer(${i})" aria-label="${p}を削除">
          <i class="ti ti-x" style="font-size:16px;" aria-hidden="true"></i>
        </button>
      </div>
    </div>`;
  }).join('');
}

function renderResults() {
  if (matchHistory.length === 0) { resultArea.innerHTML = ''; return; }
  resultArea.innerHTML = matchHistory.map((m, idx) => `
    <div class="result-card">
      <div class="result-header">
        <span>${idx === 0 ? '🏸 最新の対戦' : `${idx + 1}回前`}</span>
        <span style="font-size:12px; color:var(--color-text-tertiary);">履歴 ${matchHistory.length}件</span>
      </div>
      <div class="match-body">
        <div class="team team-a">
          ${m.teamA.map(p => `<div class="player-tag">${p}</div>`).join('')}
          ${idx === 0 && m.isNewPairA ? `<span class="new-badge">初ペア</span>` : ''}
        </div>
        <div class="vs-badge">VS</div>
        <div class="team team-b right">
          ${m.teamB.map(p => `<div class="player-tag">${p}</div>`).join('')}
          ${idx === 0 && m.isNewPairB ? `<span class="new-badge" style="align-self:flex-end;">初ペア</span>` : ''}
        </div>
      </div>
      ${m.bench.length > 0 ? `
        <div class="bench-section">
          <span class="bench-label">控え</span>
          <div style="display:flex;gap:6px;flex-wrap:wrap;">
            ${m.bench.map(p => `<span class="bench-chip">${p}</span>`).join('')}
          </div>
        </div>` : ''}
    </div>
  `).join('');
}

render();
</script>
